plugins {
    id 'io.spring.dependency-management'
    id 'application'
}

dependencyManagement {
    imports {
        mavenBom 'org.springframework.boot:spring-boot-dependencies:3.2.3'
    }
}

dependencies {
    implementation project(':spring-protocol-boot')
    implementation project(':spring-protocol-graphql:graphql-client-spring-boot-starter')

    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'com.fasterxml.jackson.core:jackson-databind'
}

application {
    mainClass = 'io.springprotocol.examples.graphql.GraphqlExampleApplication'
}
